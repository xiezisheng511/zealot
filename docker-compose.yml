services:
  zealot:
    build: .
    environment:
      - RAILS_ENV=production
      - RAILS_SERVE_STATIC_FILES=true
      - SECRET_KEY_BASE=zealot_development_secret_key_base_for_production_use_only
      - ZEALOT_DATABASE_URL=postgresql://postgres:postgres@db:5432/zealot
      - REDIS_URL=redis://redis:6379/0
      - BIND_ON=0.0.0.0:3063
      # SSO 配置 - 灵盾
      - SSO_BASE_URL=https://api-unify.seerq.io
    volumes:
      - zealot_data:/app/data
    restart: unless-stopped
    ports:
      - "3063:3063"
    depends_on:
      - db
      - redis

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=zealot
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  zealot_data:
  postgres_data:
  redis_data: